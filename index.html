<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suisa 寵物雲端健康卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.6; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .pet-header { background: linear-gradient(135deg, #00b900 0%, #008a00 100%); color: white; border: none; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
        .info-item b { opacity: 0.8; font-size: 0.75rem; display: block; }
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1.1rem; margin: 0 0 15px 0; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.85rem; color: #666; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .history-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .h-date { color: var(--primary); font-weight: bold; font-size: 0.85rem; }
        .h-diag { font-size: 0.9rem; color: #555; background: #f8f9fa; padding: 12px; border-radius: 8px; margin-top: 8px; border-left: 4px solid #ddd; }
        .loading-box { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>

    <div class="card pet-header">
        <h2 id="p_Display_Name" style="margin:0;">🐾 讀取中...</h2>
        <div class="info-grid">
            <div class="info-item"><b>品種</b><span id="p_Display_Breed">--</span></div>
            <div class="info-item"><b>出生日期</b><span id="p_Display_Birth">--</span></div>
            <div class="info-item"><b>寵物 ID</b><span id="displayId">--</span></div>
            <div class="info-item"><b>資料狀態</b><span id="syncStatus">連線中...</span></div>
        </div>
    </div>

    <div class="card">
        <h3>➕ 新增就診紀錄</h3>
        <label>寵物名字 (必填)</label>
        <input type="text" id="PetName" placeholder="例如：毛毛">

        <label>品種 / 出生日期</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="PetBreed" placeholder="品種">
            <input type="date" id="PetBirth">
        </div>

        <label>就診醫院與內容</label>
        <input type="text" id="Clinic_Name" placeholder="醫院名稱">
        <textarea id="Diagnosis" rows="2" placeholder="診斷結果"></textarea>
        
        <button class="btn" id="saveBtn" onclick="saveData()">💾 儲存並更新雲端卡片</button>
    </div>

    <div class="card">
        <h3>📅 歷史就診紀錄</h3>
        <div id="historyList" class="loading-box">準備載入紀錄...</div>
    </div>

<script>
    const liffId = "2008190733-fod2tVTS"; 
    const saveWebhookUrl = "https://hook.us2.make.com/4w3lf7uwjldhz7flcg2dpkpckwaxoz2p";
    // 這是您截圖中測試成功的網址
    const fetchHistoryWebhookUrl = "https://hook.us2.make.com/imjmhwgb72htsyiammee3svrgl9faczx"; 

    let currentPetId = "";

    async function main() {
        try {
            await liff.init({ liffId: liffId });
            if (!liff.isLoggedIn()) { liff.login(); } 
            else {
                const urlParams = new URLSearchParams(window.location.search);
                currentPetId = urlParams.get('id') || "TEST001"; // 預設測試用
                document.getElementById('displayId').innerText = currentPetId;
                fetchHistory(currentPetId);
            }
        } catch (err) { console.error(err); }
    }

    async function fetchHistory(id) {
        const listDiv = document.getElementById('historyList');
        try {
            const response = await fetch(`${fetchHistoryWebhookUrl}?id=${id}`);
            const data = await response.json(); 
            
            // 1. 處理頂部資訊 (容錯：優先找 PetName，找不到就找索引 "1")
            const info = data.petInfo || {};
            document.getElementById('p_Display_Name').innerText = "🐾 " + (info.PetName || info["1"] || "寵物");
            document.getElementById('p_Display_Breed').innerText = info.Breed || info["2"] || "--";
            document.getElementById('p_Display_Birth').innerText = info["Birth Year"] || info["3"] || "--";
            document.getElementById('syncStatus').innerText = "已同步";

            // 2. 處理歷史紀錄
            let records = data.history;
            // 如果只有一筆，Make 有時會直接給物件而不是陣列，這裡做轉換
            if (records && !Array.isArray(records)) records = [records];
            
            if (!records || records.length === 0 || records[0] === null) {
                listDiv.innerHTML = "📭 尚無就診紀錄";
                return;
            }

            listDiv.innerHTML = "";
            records.forEach(item => {
                if(!item) return;
                // 容錯：優先找 Date 或 Clinic_Name，找不到就找截圖中的索引 "2" 和 "5"
                const rDate = item.Date || item["2"] || "未填日期";
                const rClinic = item.Clinic_Name || item["5"] || "未知醫院";
                const rDiag = item.Diagnosis || item["6"] || "無詳細紀錄";

                listDiv.innerHTML += `
                    <div class="history-item">
                        <div class="h-date">📅 ${rDate}</div>
                        <div class="h-diag">
                            <b>🏥 醫院：</b>${rClinic}<br>
                            <b>👨‍⚕️ 診斷：</b>${rDiag}
                        </div>
                    </div>
                `;
            });
        } catch (err) { 
            console.error(err);
            listDiv.innerHTML = "❌ 載入失敗，請確認網路連線"; 
        }
    }

    function saveData() {
        const petName = document.getElementById('PetName').value;
        if (!petName) { alert("請填寫名字！"); return; }
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true; saveBtn.innerText = "儲存中...";

        const data = {
            PetID: currentPetId,
            PetName: petName,
            PetBreed: document.getElementById('PetBreed').value,
            PetBirth: document.getElementById('PetBirth').value,
            Clinic_Name: document.getElementById('Clinic_Name').value,
            Diagnosis: document.getElementById('Diagnosis').value,
            Date: new Date().toLocaleDateString()
        };

        fetch(saveWebhookUrl, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(() => { alert("✅ 儲存成功！"); location.reload(); })
        .catch(() => { alert("儲存失敗"); saveBtn.disabled = false; });
    }

    main();
</script>
</body>
</html>
