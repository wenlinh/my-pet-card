<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suisa 寵物雲端健康卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f4f7f6; --text: #333; --accent: #f39c12; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .pet-header { background: linear-gradient(135deg, #00b900 0%, #008a00 100%); color: white; border: none; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
        .info-item b { opacity: 0.8; font-size: 0.75rem; display: block; }
        .allergy-box { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 8px; margin-top: 10px; font-size: 0.85rem; border: 1px dashed rgba(255,255,255,0.5); }
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1.1rem; margin: 0 0 15px 0; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.85rem; color: #666; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .history-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .history-item:last-child { border-bottom: none; }
        .h-date { color: var(--primary); font-weight: bold; font-size: 0.85rem; margin-bottom: 4px; }
        .h-petinfo { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 4px; }
        .h-diag { font-size: 0.9rem; color: #555; background: #f8f9fa; padding: 12px; border-radius: 8px; line-height: 1.5; border-left: 4px solid #ddd; margin-bottom: 10px; }
        .h-photo-btn { color: var(--accent); text-decoration: none; font-weight: bold; border: 1px solid var(--accent); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; display: inline-block; margin-top: 5px; }
        .allergy-tag { background: #fee2e2; color: #dc2626; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-right: 5px; }
        #previewImage { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }
        .loading-text { text-align: center; color: #999; font-size: 0.9rem; padding: 20px; }
    </style>
</head>
<body>

    <div class="card pet-header">
        <h2 id="p_Display_Name" style="margin:0;">🐾 載入中...</h2>
        <div class="info-grid">
            <div class="info-item"><b>品種</b><span id="p_Display_Breed">--</span></div>
            <div class="info-item"><b>出生日期</b><span id="p_Display_Birth">--</span></div>
            <div class="info-item"><b>寵物 ID</b><span id="displayId">--</span></div>
            <div class="info-item"><b>資料狀態</b><span>雲端同步中</span></div>
        </div>
        <div class="allergy-box">
            <b>⚠️ 過敏原彙整：</b>
            <span id="p_Display_Allergy">尚無紀錄</span>
        </div>
    </div>

    <div class="card">
        <h3>➕ 新增就診紀錄</h3>
        
        <label>📸 上傳紀錄照片</label>
        <input type="file" id="fileInput" accept="image/*" capture="camera" onchange="previewFile()">
        <img id="previewImage" src="">

        <label>寵物名字 (必填)</label>
        <input type="text" id="PetName" placeholder="例如：咪咪">

        <label>品種 / 出生日期</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="PetBreed" placeholder="品種">
            <input type="date" id="PetBirth">
        </div>

        <label>本次發現的過敏原 (若有)</label>
        <input type="text" id="Allergy" placeholder="例如：鱈魚、盤尼西林">

        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">

        <label>就診日期 / 體重</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="date" id="Date">
            <input type="number" id="Weight" step="0.1" placeholder="kg">
        </div>

        <label>就診醫院</label>
        <input type="text" id="Clinic_Name" placeholder="醫院名稱">

        <label>醫師診斷</label>
        <textarea id="Diagnosis" rows="2" placeholder="診斷結果"></textarea>

        <label>醫囑與用藥</label>
        <textarea id="Doctor_Advice" rows="2" placeholder="醫囑內容"></textarea>

        <button class="btn" id="saveBtn" onclick="saveData()">💾 儲存並更新雲端卡片</button>
    </div>

    <div class="card">
        <h3>📅 歷史就診紀錄</h3>
        <div id="historyList" class="history-container">
            <div class="loading-text">讀取紀錄中...</div>
        </div>
    </div>

<script>
    const liffId = "2008190733-fod2tVTS"; 
    const saveWebhookUrl = "https://hook.us2.make.com/4w3lf7uwjldhz7flcg2dpkpckwaxoz2p";
    const fetchHistoryWebhookUrl = "https://hook.us2.make.com/imjmhwgb72htsyiammee3svrgl9faczx"; 

    let currentPetId = "";

    async function main() {
        try {
            await liff.init({ liffId: liffId });
            if (!liff.isLoggedIn()) { liff.login(); } 
            else {
                const urlParams = new URLSearchParams(window.location.search);
                currentPetId = urlParams.get('id');
                if (currentPetId) {
                    document.getElementById('displayId').innerText = currentPetId;
                    document.getElementById('Date').value = new Date().toISOString().split('T')[0];
                    fetchHistory(currentPetId);
                } else {
                    document.getElementById('historyList').innerHTML = '<div class="loading-text">⚠️ 請掃描 QR Code 進入</div>';
                }
            }
        } catch (err) { console.error(err); }
    }

    function previewFile() {
        const file = document.getElementById('fileInput').files[0];
        const preview = document.getElementById('previewImage');
        const reader = new FileReader();
        reader.onloadend = () => { preview.src = reader.result; preview.style.display = 'block'; }
        if (file) reader.readAsDataURL(file);
    }

    function saveData() {
        const petName = document.getElementById('PetName').value;
        if (!petName) {
            alert("請填寫寵物名字！");
            return;
        }

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "正在上傳雲端...";
        
        const file = document.getElementById('fileInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => sendToMake(reader.result);
        } else { 
            sendToMake(""); 
        }
    }

    async function sendToMake(base64Image) {
        const data = {
            PetID: currentPetId,
            PetName: document.getElementById('PetName').value,
            PetBreed: document.getElementById('PetBreed').value,
            PetBirth: document.getElementById('PetBirth').value,
            Allergy: document.getElementById('Allergy').value,
            Date: document.getElementById('Date').value,
            Weight: document.getElementById('Weight').value,
            Clinic_Name: document.getElementById('Clinic_Name').value,
            Diagnosis: document.getElementById('Diagnosis').value,
            Doctor_Advice: document.getElementById('Doctor_Advice').value,
            PhotoURL: base64Image
        };
        try {
            await fetch(saveWebhookUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            alert("✅ 紀錄已成功儲存並同步！");
            location.reload();
        } catch (err) { 
            alert("儲存失敗"); 
            document.getElementById('saveBtn').disabled = false;
            document.getElementById('saveBtn').innerText = "💾 儲存並更新雲端卡片";
        }
    }

    async function fetchHistory(id) {
        const listDiv = document.getElementById('historyList');
        try {
            const response = await fetch(`${fetchHistoryWebhookUrl}?id=${id}`);
            const historyData = await response.json();
            listDiv.innerHTML = "";
            
            if (!historyData || historyData.length === 0) {
                document.getElementById('p_Display_Name').innerText = "🐾 新寵物";
                listDiv.innerHTML = '<div class="loading-text">📭 尚無歷史紀錄</div>';
                return;
            }

            // --- 自動彙整邏輯 ---
            let allAllergies = new Set();
            historyData.forEach(item => {
                if(item.Allergies) { 
                    item.Allergies.split(/[,，、\s]+/).forEach(a => { if(a) allAllergies.add(a); });
                }
            });

            // 更新頂部資訊 (使用您的 Excel 實際欄位名稱)
            const latest = historyData.sort((a, b) => new Date(b.Date) - new Date(a.Date))[0];
            document.getElementById('p_Display_Name').innerText = "🐾 " + (latest.PetName || "寵物");
            document.getElementById('p_Display_Breed').innerText = latest.Breed || "--";
            document.getElementById('p_Display_Birth').innerText = latest['Birth Year'] || "--";
            document.getElementById('p_Display_Allergy').innerHTML = allAllergies.size > 0 
                ? Array.from(allAllergies).map(a => `<span class="allergy-tag">${a}</span>`).join(" ")
                : "無過敏紀錄";

            // 渲染歷史清單
            historyData.forEach(item => {
                listDiv.innerHTML += `
                    <div class="history-item">
                        <div class="h-petinfo">🐶 ${item.PetName || '寵物'} (${item.Breed || '品種未填'})</div>
                        <div class="h-date">📅 ${item.Date || ''} (體重: ${item.Weight || '--'}kg)</div>
                        <div class="h-hospital">🏥 ${item.Clinic_Name || '未註明醫院'}</div>
                        <div class="h-diag">
                            ${item.Allergies ? `<p style="margin-top:0;"><b style="color:#dc2626;">⚠️ 發現過敏原：</b>${item.Allergies}</p>` : ''}
                            <b>醫師診斷：</b><br>${item.Diagnosis || '無紀錄'}<br><br>
                            <b>醫囑用藥：</b><br>${item.Doctor_Advice || '無紀錄'}
                        </div>
                        ${item.PhotoURL ? `<a href="${item.PhotoURL}" target="_blank" class="h-photo-btn">🖼️ 查看藥袋照片</a>` : ''}
                    </div>
                `;
            });
        } catch (err) { 
            console.error(err);
            listDiv.innerHTML = '<div class="loading-text">❌ 讀取失敗</div>'; 
        }
    }
    main();
</script>
</body>
</html>
