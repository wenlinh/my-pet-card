<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suisa 寵物雲端健康卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f4f7f6; --text: #333; --accent: #f39c12; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        
        /* 頂部基本資訊樣式 */
        .pet-header { background: linear-gradient(135deg, #00b900 0%, #008a00 100%); color: white; border: none; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
        .info-item b { opacity: 0.8; font-size: 0.75rem; display: block; }
        
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1.1rem; margin: 0 0 15px 0; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.85rem; color: #666; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-ai { background: var(--accent); margin-bottom: 15px; }
        
        #previewImage { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }
        .history-card { border-left: 3px solid #eee; padding-left: 15px; margin-bottom: 20px; padding-bottom: 10px; }
        .history-date { font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        
        /* 載入動畫提示 */
        .loading-text { font-size: 0.8rem; color: var(--accent); display: none; margin-top: 5px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card pet-header">
        <h2 id="p_Name" style="margin:0;">🐾 載入中...</h2>
        <div class="info-grid">
            <div class="info-item"><b>出生年份</b><span id="p_BirthYear">--</span></div>
            <div class="info-item"><b>品種</b><span id="p_Breed">--</span></div>
            <div class="info-item" style="grid-column: span 2;"><b>已知過敏原</b><span id="p_Allergies">--</span></div>
        </div>
        <p style="margin:10px 0 0 0; font-size: 0.65rem; opacity: 0.7;">系統辨識碼: <span id="displayId">--</span></p>
    </div>

    <div class="card">
        <h3>➕ 新增就診/健康紀錄</h3>
        
        <label>📸 上傳檢查單/藥袋 (AI 自動填寫)</label>
        <input type="file" id="fileInput" accept="image/*" capture="camera" onchange="previewFile()">
        <img id="previewImage" src="" alt="預覽圖">
        <button id="aiBtn" class="btn btn-ai" onclick="uploadToAi()" disabled>✨ 使用 Gemini AI 辨識照片</button>
        <div id="loadingHint" class="loading-text">🚀 正在進行 AI 醫療影像分析，請勿關閉視窗...</div>

        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">

        <label>就診日期 (Date)</label>
        <input type="date" id="Date">

        <label>就診醫院 (Clinic_Name)</label>
        <input type="text" id="Clinic_Name" placeholder="醫院名稱">

        <label>體重 (Weight - kg)</label>
        <input type="number" id="Weight" step="0.1" placeholder="0.0">

        <label>醫師診斷 (Diagnosis)</label>
        <textarea id="Diagnosis" rows="2" placeholder="醫師的初步診斷"></textarea>

        <label>醫師叮囑 (Doctor_Advice)</label>
        <textarea id="Doctor_Advice" rows="2" placeholder="醫生的建議事項"></textarea>

        <label>用藥紀錄 (Medication_Taken)</label>
        <input type="text" id="Medication_Taken" placeholder="處方箋或藥名">

        <button class="btn" id="saveBtn" onclick="saveData()">💾 儲存並同步至雲端</button>
    </div>

    <div class="card">
        <h3>📅 歷史健康紀錄</h3>
        <div id="historyList" style="color:#999; font-size: 0.9rem;">正在載入歷史資料...</div>
    </div>

<script>
    // --- 核心設定區 ---
    const liffId = "2008190733-fod2tVTS"; 
    const makeWebhookUrl = "https://hook.us2.make.com/4w3lf7uwjldhz7flcg2dpkpckwaxoz2p";
    let currentPetId = "";
    let userLineId = "";

    async function main() {
        try {
            await liff.init({ liffId: liffId });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userLineId = profile.userId; 
                
                const urlParams = new URLSearchParams(window.location.search);
                currentPetId = urlParams.get('id');

                if (currentPetId) {
                    document.getElementById('displayId').innerText = currentPetId;
                    document.getElementById('Date').value = new Date().toISOString().split('T')[0];
                    fetchPetBasicInfo(currentPetId); 
                    fetchHistory(currentPetId);
                } else {
                    document.getElementById('historyList').innerText = "請掃描 QR Code 進入系統";
                }
            }
        } catch (err) {
            console.error("LIFF 初始化失敗", err);
        }
    }

    // 預覽照片
    function previewFile() {
        const file = document.getElementById('fileInput').files[0];
        const preview = document.getElementById('previewImage');
        const aiBtn = document.getElementById('aiBtn');
        const reader = new FileReader();
        reader.onloadend = function () {
            preview.src = reader.result;
            preview.style.display = 'block';
            aiBtn.disabled = false;
        }
        if (file) reader.readAsDataURL(file);
    }

    // 抓取基本資料 (由 Make.com 的另一組 Scenario 回傳)
    function fetchPetBasicInfo(id) {
        console.log("正在請求寵物資訊:", id);
        // 此處目前先保持載入狀態，待後續 Scenario 完成後對接
        document.getElementById('p_Name').innerText = "🐾 寵物 ID: " + id;
    }

    // AI 辨識功能：將照片轉為 Base64 並傳送到 Make.com
    async function uploadToAi() {
        const fileInput = document.getElementById('fileInput');
        const aiBtn = document.getElementById('aiBtn');
        const loadingHint = document.getElementById('loadingHint');
        
        if (!fileInput.files[0]) {
            alert("請先選擇或拍攝一張照片！");
            return;
        }

        aiBtn.disabled = true;
        aiBtn.innerText = "🚀 AI 辨識中...";
        loadingHint.style.display = "block";

        const reader = new FileReader();
        reader.readAsDataURL(fileInput.files[0]);
        
        reader.onload = async function () {
            const base64Data = reader.result; 

            const payload = {
                PetID: currentPetId,
                PhotoURL: base64Data, // 傳送照片代碼
                isAI: true,           // 標記為 AI 流程
                Date: document.getElementById('Date').value // 同步日期
            };

            try {
                const response = await fetch(makeWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ 影像分析請求已發送！\n請稍候 5-10 秒等待 AI 辨識回傳結果至您的雲端資料庫。");
                } else {
                    throw new Error("Make.com 回應錯誤");
                }
            } catch (err) {
                alert("辨識請求失敗，請檢查網路或 Make.com 設定");
                console.error(err);
            } finally {
                aiBtn.disabled = false;
                aiBtn.innerText = "✨ 使用 Gemini AI 辨識照片";
                loadingHint.style.display = "none";
            }
        };
    }

    // 儲存資料到雲端 (一般存檔功能)
    function saveData() {
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "傳送中...";

        const data = {
            RecordID: "REC" + Date.now(),
            PetID: currentPetId,
            OwnerLINEID: userLineId, 
            Date: document.getElementById('Date').value,
            Weight: document.getElementById('Weight').value,
            Medication_Taken: document.getElementById('Medication_Taken').value,
            Clinic_Name: document.getElementById('Clinic_Name').value,
            Doctor_Advice: document.getElementById('Doctor_Advice').value,
            Diagnosis: document.getElementById('Diagnosis').value,
            PhotoURL: "",
            isAI: false // 標記為一般手動儲存
        };

        fetch(makeWebhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => {
            if(res.ok) {
                alert("🎉 健康紀錄已儲存！");
                location.reload();
            }
        })
        .catch(err => {
            alert("儲存失敗，請檢查網路連線");
            saveBtn.disabled = false;
            saveBtn.innerText = "💾 儲存並同步至雲端";
        });
    }

    // 載入歷史紀錄 (預留)
    function fetchHistory(id) {
        document.getElementById('historyList').innerText = "暫無歷史資料";
    }

    main();
</script>
</body>
</html>
