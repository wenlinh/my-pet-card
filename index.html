<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suisa 寵物雲端健康卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .pet-header { background: linear-gradient(135deg, #00b900 0%, #009900 100%); color: white; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem; margin-top: 10px; }
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1.1rem; margin-top: 0; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.85rem; color: #666; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .history-card { border-bottom: 1px solid #eee; padding: 15px 0; font-size: 0.9rem; }
        .history-date { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="card pet-header">
        <h2 id="p_Name" style="margin:0;">🐾 讀取中...</h2>
        <div class="info-grid">
            <div>出生年：<span id="p_BirthYear">--</span></div>
            <div>品種：<span id="p_Breed">--</span></div>
            <div style="grid-column: span 2;">過敏物：<span id="p_Allergies">--</span></div>
        </div>
        <p style="margin:10px 0 0 0; font-size: 0.7rem; opacity: 0.8;">ID: <span id="displayId">--</span></p>
    </div>

    <div class="card">
        <h3>📝 新增就診紀錄</h3>
        <label>就診日期</label>
        <input type="date" id="Date">
        <label>就診醫院</label>
        <input type="text" id="Clinic_Name" placeholder="醫院名稱">
        <label>體重 (kg)</label>
        <input type="number" id="Weight" step="0.1" placeholder="0.0">
        <label>醫師診斷 (Diagnosis)</label>
        <textarea id="Diagnosis" rows="2" placeholder="診斷結果"></textarea>
        <label>醫師叮囑 (Doctor_Advice)</label>
        <textarea id="Doctor_Advice" rows="2" placeholder="建議事項"></textarea>
        <label>用藥紀錄 (Medication_Taken)</label>
        <input type="text" id="Medication_Taken" placeholder="藥名或處方">
        
        <button class="btn" onclick="saveData()">💾 儲存紀錄</button>
    </div>

    <div class="card">
        <h3>📅 歷史紀錄回看</h3>
        <div id="historyList">正在讀取雲端資料...</div>
    </div>

<script>
    const liffId = "2008190733-fod2tVTS"; 
    const makeWebhookUrl = "https://hook.us2.make.com/4w3lf7uwjldhz7flcg2dpkpckwaxoz2p";
    let currentPetId = "";

    async function main() {
        await liff.init({ liffId: liffId });
        if (!liff.isLoggedIn()) {
            liff.login();
        } else {
            const urlParams = new URLSearchParams(window.location.search);
            currentPetId = urlParams.get('id');
            if (currentPetId) {
                document.getElementById('displayId').innerText = currentPetId;
                document.getElementById('Date').value = new Date().toISOString().split('T')[0];
                fetchPetBasicInfo(currentPetId); // 抓基本資料
                fetchHistory(currentPetId);      // 抓歷史紀錄
            }
        }
    }

    // 1. 抓取基本資料 (串接 Make.com)
    function fetchPetBasicInfo(id) {
        // 這邊未來會透過 Make.com 從 Pet_List 撈資料
        // 目前先寫一個模擬範例，讓您看介面效果
        document.getElementById('p_Name').innerText = "🐾 小乖";
        document.getElementById('p_BirthYear').innerText = "2020";
        document.getElementById('p_Breed').innerText = "米克斯";
        document.getElementById('p_Allergies').innerText = "海鮮、禽肉";
    }

    // 2. 儲存資料
    function saveData() {
        const data = {
            RecordID: "REC" + Date.now(),
            PetID: currentPetId,
            Date: document.getElementById('Date').value,
            Weight: document.getElementById('Weight').value,
            Medication_Taken: document.getElementById('Medication_Taken').value,
            Clinic_Name: document.getElementById('Clinic_Name').value,
            Doctor_Advice: document.getElementById('Doctor_Advice').value,
            Diagnosis: document.getElementById('Diagnosis').value,
            PhotoURL: ""
        };

        fetch(makeWebhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(res => {
            if(res.ok) {
                alert("儲存成功！");
                location.reload();
            }
        });
    }

    // 3. 抓取歷史紀錄 (串接 Make.com)
    function fetchHistory(id) {
        document.getElementById('historyList').innerHTML = "目前暫無紀錄，請先新增一筆。";
    }

    main();
</script>
</body>
</html>
