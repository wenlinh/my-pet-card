<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suisa 寵物雲端健康卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f4f7f6; --text: #333; --accent: #f39c12; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .pet-header { background: linear-gradient(135deg, #00b900 0%, #008a00 100%); color: white; border: none; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
        .info-item b { opacity: 0.8; font-size: 0.75rem; display: block; }
        .allergy-box { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 8px; margin-top: 10px; font-size: 0.85rem; border: 1px dashed rgba(255,255,255,0.5); }
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1.1rem; margin: 0 0 15px 0; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.85rem; color: #666; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .history-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .h-date { color: var(--primary); font-weight: bold; font-size: 0.85rem; }
        .h-diag { font-size: 0.9rem; color: #555; background: #f8f9fa; padding: 12px; border-radius: 8px; margin-top: 8px; border-left: 4px solid #ddd; }
        .allergy-tag { background: #fee2e2; color: #dc2626; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="card pet-header">
        <h2 id="p_Display_Name" style="margin:0;">🐾 載入中...</h2>
        <div class="info-grid">
            <div class="info-item"><b>品種</b><span id="p_Display_Breed">--</span></div>
            <div class="info-item"><b>出生日期</b><span id="p_Display_Birth">--</span></div>
            <div class="info-item"><b>寵物 ID</b><span id="displayId">--</span></div>
            <div class="info-item"><b>資料狀態</b><span>雲端同步中</span></div>
        </div>
        <div class="allergy-box">
            <b>⚠️ 過敏原彙整：</b> <span id="p_Display_Allergy">尚無紀錄</span>
        </div>
    </div>

    <div class="card">
        <h3>➕ 新增就診紀錄</h3>
        <label>📸 上傳紀錄照片</label>
        <input type="file" id="fileInput" accept="image/*" capture="camera" onchange="previewFile()">
        <img id="previewImage" src="" style="width:100%; display:none; margin-top:10px; border-radius:10px;">

        <label>寵物名字 (必填)</label>
        <input type="text" id="PetName" placeholder="例如：毛毛">

        <label>品種 / 出生日期</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="PetBreed" placeholder="品種">
            <input type="date" id="PetBirth">
        </div>

        <label>過敏原 / 體重</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="Allergy" placeholder="例如：鱈魚">
            <input type="number" id="Weight" step="0.1" placeholder="kg">
        </div>

        <label>就診醫院與內容</label>
        <input type="text" id="Clinic_Name" placeholder="醫院名稱">
        <textarea id="Diagnosis" rows="2" placeholder="診斷結果"></textarea>
        <textarea id="Doctor_Advice" rows="2" placeholder="醫囑內容"></textarea>

        <button class="btn" id="saveBtn" onclick="saveData()">💾 儲存並更新雲端卡片</button>
    </div>

    <div class="card">
        <h3>📅 歷史就診紀錄</h3>
        <div id="historyList" style="text-align:center; padding:20px; color:#999;">讀取紀錄中...</div>
    </div>

<script>
    const liffId = "2008190733-fod2tVTS"; 
    const saveWebhookUrl = "https://hook.us2.make.com/4w3lf7uwjldhz7flcg2dpkpckwaxoz2p";
    const fetchHistoryWebhookUrl = "https://hook.us2.make.com/imjmhwgb72htsyiammee3svrgl9faczx"; 

    let currentPetId = "";

    function formatExcelDate(serial) {
        if (!serial || isNaN(serial) || serial < 1000) return serial || "未填";
        const date = new Date((serial - 25569) * 86400 * 1000);
        return date.toISOString().split('T')[0];
    }

    async function main() {
        try {
            await liff.init({ liffId: liffId });
            if (!liff.isLoggedIn()) { liff.login(); } 
            else {
                const urlParams = new URLSearchParams(window.location.search);
                currentPetId = urlParams.get('id');
                if (currentPetId) {
                    document.getElementById('displayId').innerText = currentPetId;
                    fetchHistory(currentPetId);
                }
            }
        } catch (err) { console.error(err); }
    }

    function previewFile() {
        const file = document.getElementById('fileInput').files[0];
        const preview = document.getElementById('previewImage');
        const reader = new FileReader();
        reader.onloadend = () => { preview.src = reader.result; preview.style.display = 'block'; }
        if (file) reader.readAsDataURL(file);
    }

    function saveData() {
        const petName = document.getElementById('PetName').value;
        if (!petName) { alert("請填寫名字！"); return; }
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true; saveBtn.innerText = "上傳中...";
        const file = document.getElementById('fileInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => sendToMake(reader.result);
        } else { sendToMake(""); }
    }

    async function sendToMake(base64Image) {
        const data = {
            PetID: currentPetId,
            PetName: document.getElementById('PetName').value,
            PetBreed: document.getElementById('PetBreed').value,
            PetBirth: document.getElementById('PetBirth').value,
            Allergy: document.getElementById('Allergy').value,
            Date: new Date().toISOString().split('T')[0],
            Weight: document.getElementById('Weight').value,
            Clinic_Name: document.getElementById('Clinic_Name').value,
            Diagnosis: document.getElementById('Diagnosis').value,
            Doctor_Advice: document.getElementById('Doctor_Advice').value,
            PhotoURL: base64Image
        };
        try {
            await fetch(saveWebhookUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            alert("✅ 儲存成功！"); location.reload();
        } catch (err) { alert("儲存失敗"); document.getElementById('saveBtn').disabled = false; }
    }

    async function fetchHistory(id) {
        const listDiv = document.getElementById('historyList');
        try {
            const response = await fetch(`${fetchHistoryWebhookUrl}?id=${id}`);
            const data = await response.json(); 
            listDiv.innerHTML = "";

            if (data.petInfo) {
                const info = data.petInfo;
                document.getElementById('p_Display_Name').innerText = "🐾 " + (info.PetName || "寵物");
                document.getElementById('p_Display_Breed').innerText = info.Breed || "--";
                document.getElementById('p_Display_Birth').innerText = info["Birth Year"] || "--";
            }

            const records = data.history || [];
            if (records.length === 0) {
                listDiv.innerHTML = "📭 尚無就診紀錄"; return;
            }

            let allAllergies = new Set();
            records.forEach(item => {
                const a = item.Allergy || item.Allergies || "";
                if(a) a.split(/[,，、\s]+/).forEach(v => allAllergies.add(v.trim()));
            });
            document.getElementById('p_Display_Allergy').innerHTML = Array.from(allAllergies).map(a => `<span class="allergy-tag">${a}</span>`).join("") || "無";

            records.forEach(item => {
                listDiv.innerHTML += `
                    <div class="history-item">
                        <div class="h-date">📅 ${formatExcelDate(item.Date)} (體重: ${item.Weight || '--'}kg)</div>
                        <div class="h-diag">
                            <b>🏥 醫院：</b>${item.Clinic_Name || '未註明'}<br>
                            <b>👨‍⚕️ 診斷：</b>${item.Diagnosis || '無紀錄'}<br>
                            <b>💊 醫囑：</b>${item.Doctor_Advice || '無紀錄'}
                        </div>
                    </div>
                `;
            });
        } catch (err) { 
            console.error(err);
            listDiv.innerHTML = "❌ 載入失敗"; 
        }
    }
    main();
</script>
</body>
</html>
